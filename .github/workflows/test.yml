name: Test CLI

on:
  workflow_call:
    inputs:
      sdk-version:
        description: "Dart SDK version"
        type: string
        required: false
        default: "3.10.0"

  pull_request:
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "CHANGELOG.md"
      - "**/*.md"
      - "**/LICENSE"
      - ".gitignore"
      - "docs/public/install.sh"
      - "docs/public/uninstall.sh"
      - "scripts/install.ps1"
      - "scripts/test-install-arch.sh"
      - "scripts/test-install.sh"
      - ".github/workflows/test-install.yml"

  push:
    branches: [ main, develop ]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "CHANGELOG.md"
      - "**/*.md"
      - "**/LICENSE"
      - ".gitignore"
      - "docs/public/install.sh"
      - "docs/public/uninstall.sh"
      - "scripts/install.ps1"
      - "scripts/test-install-arch.sh"
      - "scripts/test-install.sh"
      - ".github/workflows/test-install.yml"

  workflow_dispatch:

env:
  SDK_VERSION: "3.10.0"
  RELEASE_DART_SDK: "3.9.0"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Unit Tests - Run first for fast feedback
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Test
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare environment
        uses: ./.github/actions/prepare
        with:
          sdk-version: ${{ (github.event_name == 'workflow_call' && inputs.sdk-version) || env.SDK_VERSION }}

      - name: fvm_mcp | Install dependencies
        working-directory: fvm_mcp
        run: dart pub get

      - uses: invertase/github-action-dart-analyzer@v1
        with:
          fatal-infos: false

      - name: Install DCM
        uses: CQLabs/setup-dcm@v1
        continue-on-error: true
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure DCM available
        run: |
          if ! command -v dcm >/dev/null 2>&1; then
            dart pub global activate dart_code_metrics
            echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"
          fi

      - name: Run DCM
        run: dcm analyze lib fvm_mcp/lib
      
      - name: Install lcov
        run: sudo apt-get install lcov

      - name: Run tests (root)
        uses: ./.github/actions/test
        with:
          with-coverage: 'true'

      - name: fvm_mcp | Format check
        working-directory: fvm_mcp
        run: dart format --output=none --set-exit-if-changed .

      - name: fvm_mcp | Analyze
        working-directory: fvm_mcp
        run: dart analyze

      - name: fvm_mcp | Tests
        working-directory: fvm_mcp
        run: dart test

      - name: Clean Dart SDK temp files
        run: rm -f ${{ runner.temp }}/dartsdk-*.zip

      - name: Setup Dart (release tool)
        uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ env.RELEASE_DART_SDK }}

      - name: Release tool | Install dependencies
        working-directory: tool/release_tool
        run: dart pub get

      - name: Release tool | Analyze
        working-directory: tool/release_tool
        run: dart analyze

      - name: Release tool | Tests
        working-directory: tool/release_tool
        run: dart test

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}


  test-os:
    name: Test on ${{ matrix.os }}
    timeout-minutes: 30
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [macos-latest, windows-latest]

    steps:        
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare environment
        uses: ./.github/actions/prepare
        with:
          sdk-version: ${{ (github.event_name == 'workflow_call' && inputs.sdk-version) || env.SDK_VERSION }}

      - name: fvm_mcp | Install dependencies
        working-directory: fvm_mcp
        run: dart pub get
        shell: bash

      - name: Tests
        uses: ./.github/actions/test

      - name: fvm_mcp | Analyze
        working-directory: fvm_mcp
        run: dart analyze
        shell: bash

      - name: fvm_mcp | Tests
        working-directory: fvm_mcp
        run: dart test
        shell: bash

  # ─────────────────────────────────────────────────────────────────────────────
  # Integration Tests - Run in parallel with unit tests
  # ─────────────────────────────────────────────────────────────────────────────
  integration-test:
    name: Integration Tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: [test, test-os]
    timeout-minutes: 45
    # Skip heavy integration tests for the fvm-mcp PR branch (MCP-only changes).
    if: github.event_name != 'pull_request' || github.event.pull_request.head.ref != 'fvm-mcp'

    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ (github.event_name == 'workflow_call' && inputs.sdk-version) || env.SDK_VERSION }}

      - name: Install dependencies
        run: dart pub get

      - name: Setup Git (required for FVM operations)
        run: |
          git config --global user.name "FVM Integration Test"
          git config --global user.email "test@fvm.app"

      - name: Run Integration Tests
        shell: bash
        run: dart run grinder integration-test

  migration-test:
    name: Migration Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Setup Git (required for FVM operations)
        run: |
          git config --global user.name "FVM Integration Test"
          git config --global user.email "test@fvm.app"

      - name: Migration from v3 integration test
        env:
          RUN_MIGRATION_IT: "true"
        run: dart test test/integration/migration_from_v3_test.dart
